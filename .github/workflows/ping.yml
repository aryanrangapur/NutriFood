name: Ping Nutrifood Site

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          set -e
          echo "Pinging Nutrifood..."
          curl -f -s https://nutrifood.onrender.com/ > /dev/null
          echo "✅ Nutrifood is reachable"
